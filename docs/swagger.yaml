basePath: /
definitions:
  model.Cell:
    properties:
      isBlank:
        type: boolean
      numberAssociated:
        type: integer
    type: object
  model.Clues:
    properties:
      across:
        items:
          $ref: '#/definitions/model.UnitClue'
        type: array
      down:
        items:
          $ref: '#/definitions/model.UnitClue'
        type: array
    type: object
  model.Crossword:
    properties:
      clues:
        $ref: '#/definitions/model.Clues'
      columns:
        type: integer
      crosswordID:
        type: integer
      grid:
        items:
          items:
            $ref: '#/definitions/model.Cell'
          type: array
        type: array
      rows:
        type: integer
    type: object
  model.CrosswordAnswer:
    description: A user's crossword answer submission
    properties:
      answers:
        items:
          $ref: '#/definitions/model.UnitClue'
        type: array
      crossword_id:
        example: 1
        type: integer
    type: object
  model.TokenSample:
    properties:
      token:
        example: your_token
        type: string
    type: object
  model.UnitClue:
    description: A singular clue with its index
    properties:
      clueID:
        example: 1
        type: integer
      clueText:
        example: APPLE
        type: string
    type: object
  model.User:
    description: User entity with unique email and optional crossword answer
    properties:
      email:
        example: user@example.com
        type: string
      id:
        example: 1
        type: integer
      score:
        example: 0
        type: integer
      username:
        example: JohnDoe
        type: string
    type: object
host: https://crosswordbackend.onrender.com/
info:
  contact: {}
  description: Backend API for Crossword App
  title: Crossword API
  version: "1.0"
paths:
  /admin/updateCrossword:
    post:
      consumes:
      - application/json
      description: Allows admin to upload or replace the crossword JSON file for the
        current day.
      parameters:
      - description: Admin authentication key
        in: header
        name: X-Admin-Key
        required: true
        type: string
      - description: Crossword JSON data
        in: body
        name: crossword
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Crossword uploaded successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized (invalid admin key)
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error updating crossword
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload or update the crossword puzzle
      tags:
      - Admin
  /admin/updateScore:
    post:
      description: Runs the daily crossword scoring process. Compares every user's
        stored crossword answers with the official solution and updates their total
        scores accordingly.
      parameters:
      - description: Admin authentication key
        in: header
        name: X-Admin-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Scores updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized (invalid admin key)
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error loading solutions or updating scores
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Compare user answers and update scores
      tags:
      - Admin
  /admin/updateSolution:
    post:
      consumes:
      - application/json
      description: Allows admin to upload the official solution JSON file after the
        puzzle day ends.
      parameters:
      - description: Admin authentication key
        in: header
        name: X-Admin-Key
        required: true
        type: string
      - description: Solution JSON data
        in: body
        name: solution
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Solution uploaded successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized (invalid admin key)
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Error updating solution
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload or update the crossword solution
      tags:
      - Admin
  /auth/google:
    post:
      consumes:
      - application/json
      description: Verifies Google token, auto-registers user if new, returns JWT
      parameters:
      - description: Google ID Token
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/model.TokenSample'
      produces:
      - application/json
      responses:
        "200":
          description: Authenticated successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request format
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid Google token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Authenticate with Google
      tags:
      - Auth
  /crossword:
    get:
      description: Returns crossword grid data and clues from JSON file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Crossword'
        "500":
          description: Crossword not found or parse error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get today's crossword
      tags:
      - Crossword
  /crossword/submit:
    post:
      consumes:
      - application/json
      description: Accepts a JSON payload of crossword answers for a specific crossword
        and stores it in the database.
      parameters:
      - description: JWT token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Crossword answer submission
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CrosswordAnswer'
      produces:
      - application/json
      responses:
        "200":
          description: '{"message": "Answer stored"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Possible causes:\n- Invalid JSON format in request body\n-
            User has already submitted answers for this crossword
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: '{"error": "User not found in context"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: '{"error": "Database error"}'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Submit crossword answers
      tags:
      - Crossword
  /getsolution:
    post:
      consumes:
      - application/json
      description: Fetches both the crossword question (grid, clues, etc.) and the
        corresponding solution for a given crossword ID.
      parameters:
      - description: ID of the crossword to fetch
        in: body
        name: crossword_id
        required: true
        schema:
          type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Crossword and solution successfully fetched
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request or solution not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error while reading files
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Crossword and Solution
      tags:
      - Crossword
  /leaderboard:
    get:
      description: Returns a list of users sorted by score in descending order
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.User'
            type: array
        "500":
          description: Database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get leaderboard
      tags:
      - Leaderboard
  /users/login:
    post:
      consumes:
      - application/json
      description: Returns JWT token if user exists
      parameters:
      - description: User login info
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/model.User'
      produces:
      - application/json
      responses:
        "200":
          description: Successful login
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request format
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: User not registered
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Log in existing user
      tags:
      - Auth
  /users/register:
    post:
      consumes:
      - application/json
      description: Creates a new user if not registered and returns a JWT token. If
        already registered, returns the user(no JWT token)
      parameters:
      - description: User info
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/model.User'
      produces:
      - application/json
      responses:
        "201":
          description: User successfully registered
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request format
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Database or token error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - Auth
swagger: "2.0"
